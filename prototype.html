<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PRS — Personal Recording System · Artifact Prototype</title>
<style>
/* ============================================================
   DESIGN SYSTEM
   ============================================================ */
:root {
  --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Roboto, "Helvetica Neue", Arial, sans-serif;
  --font-mono: "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;

  --space-1: 4px;  --space-2: 8px;  --space-3: 12px; --space-4: 16px;
  --space-5: 20px; --space-6: 24px; --space-8: 32px; --space-10: 40px;

  --radius-sm: 4px; --radius: 8px; --radius-lg: 12px;

  /* Semantic tokens: dark (default) */
  --bg:           #0b0e14;
  --bg-elevated:  #11151f;
  --bg-panel:     #0f131c;
  --bg-hover:     #161b27;
  --bg-active:    #1b2230;
  --border:       #1f2632;
  --border-strong:#2a3344;
  --text:         #e6ebf2;
  --text-muted:   #8b94a7;
  --text-dim:     #5b6477;
  --accent:       #6ea8ff;
  --accent-soft:  rgba(110,168,255,0.12);

  /* Semantic colors (meaning, not decoration) */
  --c-retro:      #c98a7d;
  --c-present:    #7ec3a8;
  --c-prospective:#6ea8ff;
  --c-confirmed:  #7ec3a8;
  --c-speculative:#d4b25a;
  --c-inferred:   #6ea8ff;
  --c-disputed:   #e07a7a;
  --c-pending:    #8b94a7;
  --c-active:     #6ea8ff;
  --c-blocked:    #e07a7a;
  --c-completed:  #7ec3a8;
  --c-delegated:  #b79bff;
  --c-critical:   #e07a7a;
  --c-high:       #d4a14a;
  --c-medium:     #6ea8ff;
  --c-low:        #8b94a7;
  --c-purple:     #9b7dff;
  --c-gcal:       #d56c6c;

  --shadow: 0 1px 2px rgba(0,0,0,.25), 0 8px 24px rgba(0,0,0,.25);
}

[data-theme="light"] {
  --bg:           #f6f7f9;
  --bg-elevated:  #ffffff;
  --bg-panel:     #fbfbfd;
  --bg-hover:     #eef0f4;
  --bg-active:    #e6e9ef;
  --border:       #e2e6ec;
  --border-strong:#d2d8e0;
  --text:         #1a2230;
  --text-muted:   #5b6477;
  --text-dim:     #97a0b2;
  --accent:       #2f6fd6;
  --accent-soft:  rgba(47,111,214,0.10);
  --shadow: 0 1px 2px rgba(20,30,60,.06), 0 8px 24px rgba(20,30,60,.08);
}

* { box-sizing: border-box; }
html, body { height: 100%; }
body {
  margin: 0;
  font-family: var(--font-sans);
  background: var(--bg);
  color: var(--text);
  font-size: 13.5px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}
button { font-family: inherit; cursor: pointer; }
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 8px; }
::-webkit-scrollbar-track { background: transparent; }

/* ============================================================
   APP SHELL
   ============================================================ */
.app {
  display: grid;
  grid-template-columns: 240px 1fr;
  grid-template-rows: 48px 1fr;
  grid-template-areas: "topbar topbar" "rail main";
  height: 100vh;
}

/* ---------- Top bar ---------- */
.topbar {
  grid-area: topbar;
  display: flex; align-items: center; gap: var(--space-4);
  padding: 0 var(--space-4);
  background: var(--bg-elevated);
  border-bottom: 1px solid var(--border);
  z-index: 20;
}
.brand { display: flex; align-items: center; gap: var(--space-2); font-weight: 600; letter-spacing: .2px; width: 224px; }
.brand .logo {
  width: 22px; height: 22px; border-radius: 6px;
  background: linear-gradient(135deg, var(--accent), #9b7dff);
  display: grid; place-items: center; color: #fff; font-size: 12px; font-weight: 700;
}
.brand small { color: var(--text-muted); font-weight: 500; font-size: 11px; }

.search { flex: 1; max-width: 520px; position: relative; }
.search input {
  width: 100%; height: 32px; padding: 0 12px 0 34px;
  background: var(--bg-panel); border: 1px solid var(--border);
  border-radius: var(--radius); color: var(--text); font-size: 13px; outline: none;
  transition: border-color .15s;
}
.search input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
.search .icon { position: absolute; left: 10px; top: 8px; color: var(--text-muted); }
.search kbd {
  position: absolute; right: 8px; top: 7px;
  font-family: var(--font-mono); font-size: 11px; color: var(--text-muted);
  background: var(--bg); border: 1px solid var(--border); padding: 1px 6px; border-radius: 4px;
}

.top-actions { display: flex; align-items: center; gap: var(--space-2); margin-left: auto; }
.icon-btn {
  width: 32px; height: 32px; border-radius: var(--radius);
  background: transparent; border: 1px solid transparent; color: var(--text-muted);
  display: grid; place-items: center; position: relative;
}
.icon-btn:hover { background: var(--bg-hover); color: var(--text); }
.sync-status {
  display: flex; align-items: center; gap: 6px; font-size: 11.5px; color: var(--text-muted);
  padding: 4px 10px; border-radius: 20px; background: var(--bg-panel); border: 1px solid var(--border);
}
.sync-status .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--c-confirmed); box-shadow: 0 0 0 3px rgba(126,195,168,.15); }
.icon-btn .badge { position: absolute; top: 4px; right: 4px; background: var(--c-critical); color: #fff; font-size: 9px; font-weight: 700; min-width: 15px; height: 15px; border-radius: 8px; display: grid; place-items: center; padding: 0 3px; }

/* ---------- Left rail ---------- */
.rail {
  grid-area: rail;
  background: var(--bg-elevated);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  padding: var(--space-3);
}
.new-record {
  display: flex; align-items: center; gap: var(--space-2); justify-content: center;
  width: 100%; height: 36px; border-radius: var(--radius);
  background: var(--accent); color: #fff; border: none; font-weight: 600; font-size: 13px;
}
.new-record:hover { filter: brightness(1.08); }
.new-record kbd { background: rgba(255,255,255,.2); border-radius: 4px; padding: 1px 6px; font-size: 10px; font-family: var(--font-mono); }

.nav-group { margin-top: var(--space-5); }
.nav-group .label {
  font-size: 10.5px; text-transform: uppercase; letter-spacing: .08em;
  color: var(--text-dim); font-weight: 600; padding: 0 var(--space-2); margin-bottom: 4px;
}
.nav-item {
  display: flex; align-items: center; gap: var(--space-2);
  padding: 6px var(--space-2); border-radius: var(--radius-sm);
  color: var(--text-muted); font-size: 13px; cursor: pointer; user-select: none;
  text-decoration: none;
}
.nav-item:hover { background: var(--bg-hover); color: var(--text); }
.nav-item.active { background: var(--accent-soft); color: var(--accent); font-weight: 500; }
.nav-item .count { margin-left: auto; font-size: 11px; color: var(--text-dim); font-variant-numeric: tabular-nums; }
.nav-item svg { flex-shrink: 0; }

/* ---------- Main ---------- */
.main { grid-area: main; overflow-y: auto; padding: var(--space-6); }
.page-header { display: flex; align-items: baseline; gap: var(--space-3); margin-bottom: var(--space-5); flex-wrap: wrap; }
.page-header h1 { font-size: 19px; margin: 0; font-weight: 600; }
.page-header .sub { color: var(--text-muted); font-size: 13px; }
.page-header .actions { margin-left: auto; display: flex; gap: var(--space-2); align-items: center; }
.seg {
  display: inline-flex; background: var(--bg-panel); border: 1px solid var(--border); border-radius: var(--radius); padding: 2px;
}
.seg button {
  background: transparent; border: none; color: var(--text-muted); font-size: 12px;
  padding: 5px 12px; border-radius: 6px;
}
.seg button.active { background: var(--bg-elevated); color: var(--text); box-shadow: var(--shadow); }

/* ============================================================
   KPI ROW
   ============================================================ */
.kpis { display: grid; grid-template-columns: repeat(5, 1fr); gap: var(--space-4); margin-bottom: var(--space-5); }
.kpi { background: var(--bg-elevated); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: var(--space-4); position: relative; }
.kpi .k { font-size: 11.5px; color: var(--text-muted); text-transform: uppercase; letter-spacing: .05em; font-weight: 600; }
.kpi .v { font-size: 26px; font-weight: 600; margin-top: 6px; font-variant-numeric: tabular-nums; }
.kpi .delta { font-size: 11px; margin-top: 4px; display: flex; align-items: center; gap: 4px; }
.kpi .delta.up { color: var(--c-confirmed); }
.kpi .delta.down { color: var(--c-disputed); }
.kpi .delta.flat { color: var(--text-muted); }
.kpi .spark { position: absolute; right: var(--space-3); bottom: var(--space-3); opacity: .7; }

/* ============================================================
   DASHBOARD GRID + CARDS
   ============================================================ */
.grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: var(--space-4); }
.card {
  background: var(--bg-elevated); border: 1px solid var(--border); border-radius: var(--radius-lg);
  display: flex; flex-direction: column; overflow: hidden;
}
.card.clickable { cursor: pointer; transition: border-color .15s, transform .15s; }
.card.clickable:hover { border-color: var(--accent); }
.card .head {
  display: flex; align-items: center; gap: var(--space-2);
  padding: var(--space-3) var(--space-4); border-bottom: 1px solid var(--border);
}
.card .head .title { font-weight: 600; font-size: 13px; }
.card .head .sub { color: var(--text-muted); font-size: 11.5px; }
.card .head .tools { margin-left: auto; display: flex; gap: 4px; }
.card .head .tools button {
  background: transparent; border: 1px solid transparent; color: var(--text-muted);
  border-radius: 4px; width: 22px; height: 22px; display: grid; place-items: center;
}
.card .head .tools button:hover { background: var(--bg-hover); color: var(--text); }
.card .body { padding: var(--space-4); flex: 1; }
.card .body.scroll { overflow-y: auto; }

.col-3 { grid-column: span 3; }
.col-4 { grid-column: span 4; }
.col-5 { grid-column: span 5; }
.col-6 { grid-column: span 6; }
.col-7 { grid-column: span 7; }
.col-8 { grid-column: span 8; }
.col-12 { grid-column: span 12; }
.row-tall { min-height: 320px; }
.row-med { min-height: 250px; }

/* ============================================================
   CHROME / STATUS
   ============================================================ */
.heatmap svg { display: block; width: 100%; }
.legend { display: flex; gap: 10px; font-size: 11px; color: var(--text-muted); align-items: center; flex-wrap: wrap; }
.legend i { width: 10px; height: 10px; border-radius: 2px; display: inline-block; }

/* ============================================================
   LISTS / TABLES
   ============================================================ */
.list { display: flex; flex-direction: column; }
.list .row {
  display: flex; align-items: center; gap: var(--space-3);
  padding: var(--space-3); border-bottom: 1px solid var(--border); cursor: pointer;
}
.list .row:last-child { border-bottom: none; }
.list .row:hover { background: var(--bg-hover); }
.list .row.selected { background: var(--accent-soft); }
.list .row .pr { width: 2px; height: 24px; border-radius: 1px; background: var(--text-dim); flex-shrink: 0; }
.list .row .main-txt { flex: 1; min-width: 0; }
.list .row .t { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.list .row .m { font-size: 11.5px; color: var(--text-muted); display: flex; gap: 8px; margin-top: 2px; flex-wrap: wrap; }
.list .row .meta-r { text-align: right; font-size: 11px; color: var(--text-muted); }

.pill {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 10.5px; font-weight: 600; padding: 2px 7px; border-radius: 10px;
  border: 1px solid var(--border); color: var(--text-muted); white-space: nowrap;
  font-family: var(--font-mono);
}
.pill.confirmed { color: var(--c-confirmed); border-color: rgba(126,195,168,.4); background: rgba(126,195,168,.08); }
.pill.speculative { color: var(--c-speculative); border-color: rgba(212,178,90,.4); background: rgba(212,178,90,.08); }
.pill.inferred { color: var(--c-inferred); border-color: rgba(110,168,255,.4); background: rgba(110,168,255,.08); }
.pill.disputed { color: var(--c-disputed); border-color: rgba(224,122,122,.4); background: rgba(224,122,122,.08); }
.pill.active { color: var(--c-active); border-color: rgba(110,168,255,.4); background: rgba(110,168,255,.08); }
.pill.blocked { color: var(--c-blocked); border-color: rgba(224,122,122,.4); background: rgba(224,122,122,.08); }
.pill.completed { color: var(--c-completed); border-color: rgba(126,195,168,.4); background: rgba(126,195,168,.08); }
.pill.delegated { color: var(--c-delegated); border-color: rgba(183,155,255,.4); background: rgba(183,155,255,.08); }
.pill.pending { color: var(--c-pending); }
.pill.critical { color: var(--c-critical); border-color: rgba(224,122,122,.4); background: rgba(224,122,122,.08); }
.pill.high { color: var(--c-high); border-color: rgba(212,161,74,.4); background: rgba(212,161,74,.08); }
.pill.medium { color: var(--c-medium); border-color: rgba(110,168,255,.4); background: rgba(110,168,255,.08); }
.pill.low { color: var(--c-low); }

.tag { font-size: 11px; color: var(--text-muted); background: var(--bg); border: 1px solid var(--border); border-radius: 4px; padding: 1px 6px; font-family: var(--font-mono); }

/* ============================================================
   DETAIL PANE (right slide-in)
   ============================================================ */
.detail-pane {
  position: fixed; top: 48px; right: 0; bottom: 0; width: 420px;
  background: var(--bg-elevated); border-left: 1px solid var(--border);
  transform: translateX(100%); transition: transform .22s cubic-bezier(.4,0,.2,1);
  z-index: 30; display: flex; flex-direction: column; box-shadow: -16px 0 40px rgba(0,0,0,.25);
}
.detail-pane.open { transform: translateX(0); }
.detail-pane .head { padding: var(--space-4); border-bottom: 1px solid var(--border); display: flex; align-items: flex-start; gap: var(--space-2); }
.detail-pane .head .title { font-weight: 600; font-size: 14px; flex: 1; }
.detail-pane .body { padding: var(--space-4); overflow-y: auto; flex: 1; }
.detail-pane .close { background: transparent; border: none; color: var(--text-muted); font-size: 18px; }
.detail-pane .close:hover { color: var(--text); }
.field-group { margin-bottom: var(--space-5); }
.field-group .glabel { font-size: 10.5px; text-transform: uppercase; letter-spacing: .06em; color: var(--text-dim); font-weight: 600; margin-bottom: 6px; }
.field-row { display: grid; grid-template-columns: 110px 1fr; padding: 5px 0; font-size: 12.5px; align-items: center; }
.field-row .k { color: var(--text-muted); font-family: var(--font-mono); font-size: 11.5px; }
.field-row .v { color: var(--text); }
.kvlist .field-row { border-bottom: 1px dashed var(--border); }
.kvlist .field-row:last-child { border-bottom: none; }
.rel-link { display: flex; align-items: center; gap: 6px; padding: 4px 0; font-size: 12.5px; }
.rel-link .rt { font-family: var(--font-mono); font-size: 10.5px; color: var(--text-muted); background: var(--bg); border: 1px solid var(--border); padding: 1px 5px; border-radius: 3px; }
.content-block { background: var(--bg-panel); border: 1px solid var(--border); border-radius: var(--radius); padding: var(--space-3); font-size: 13px; margin-bottom: var(--space-3); }
.content-block h3 { margin: 0 0 6px; font-size: 13px; }
.content-block p { margin: 0; color: var(--text-muted); }
.revision-tag { font-size: 11px; color: var(--text-muted); }

/* ============================================================
   COMMAND PALETTE
   ============================================================ */
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,.5); backdrop-filter: blur(3px); z-index: 50; display: none; }
.overlay.show { display: block; }
.cmd-palette {
  position: fixed; top: 18vh; left: 50%; transform: translateX(-50%);
  width: 560px; max-width: 92vw; background: var(--bg-elevated);
  border: 1px solid var(--border-strong); border-radius: var(--radius-lg); box-shadow: 0 20px 60px rgba(0,0,0,.4);
  z-index: 51; overflow: hidden;
}
.cmd-palette .input-wrap { display: flex; align-items: center; padding: var(--space-3) var(--space-4); border-bottom: 1px solid var(--border); }
.cmd-palette input { flex: 1; background: transparent; border: none; outline: none; color: var(--text); font-size: 15px; }
.cmd-palette .results { max-height: 360px; overflow-y: auto; padding: 6px; }
.cmd-item { display: flex; align-items: center; gap: var(--space-3); padding: 8px var(--space-3); border-radius: var(--radius-sm); cursor: pointer; }
.cmd-item.active, .cmd-item:hover { background: var(--accent-soft); }
.cmd-item .cat { font-size: 10.5px; color: var(--text-dim); margin-left: auto; font-family: var(--font-mono); }
.cmd-item kbd { font-family: var(--font-mono); font-size: 10.5px; color: var(--text-muted); background: var(--bg); border: 1px solid var(--border); padding: 1px 5px; border-radius: 3px; }

/* ============================================================
   FULL-PAGE ARTIFACT LAYOUT
   ============================================================ */
.artifact-page { display: flex; flex-direction: column; gap: var(--space-4); }
.artifact-canvas {
  background: var(--bg-elevated); border: 1px solid var(--border); border-radius: var(--radius-lg);
  padding: var(--space-5); min-height: 520px;
}
.artifact-canvas svg { display: block; width: 100%; height: auto; }
.full-svg { width: 100%; height: 560px; }
.stat-row { display: flex; gap: var(--space-3); flex-wrap: wrap; }
.stat {
  background: var(--bg-panel); border: 1px solid var(--border); border-radius: var(--radius);
  padding: var(--space-3) var(--space-4); min-width: 140px;
}
.stat .k { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: .04em; }
.stat .v { font-size: 20px; font-weight: 600; margin-top: 4px; font-variant-numeric: tabular-nums; }
.callout {
  border-left: 3px solid var(--accent); background: var(--accent-soft);
  padding: var(--space-3) var(--space-4); border-radius: var(--radius-sm); font-size: 13px;
}
.callout.warn { border-left-color: var(--c-high); background: rgba(212,161,74,.08); }
.callout.bad { border-left-color: var(--c-disputed); background: rgba(224,122,122,.08); }

/* Calendar grid (Monthly Summary / Recurrence) */
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
.cal-grid .dow { font-size: 10px; color: var(--text-dim); text-transform: uppercase; text-align: center; padding: 4px 0; }
.cal-grid .day {
  aspect-ratio: 1; border-radius: var(--radius-sm); border: 1px solid var(--border);
  background: var(--bg-panel); padding: 4px; font-size: 11px; position: relative; min-height: 44px;
}
.cal-grid .day .n { color: var(--text-dim); font-weight: 600; }
.cal-grid .day.has .n { color: var(--text); }
.cal-grid .day .dots { position: absolute; bottom: 4px; left: 4px; display: flex; gap: 2px; flex-wrap: wrap; }
.cal-grid .day .dots i { width: 6px; height: 6px; border-radius: 50%; }

/* ============================================================
   CALENDAR (Google Calendar integrated — central temporal hub)
   ============================================================ */
.cal-page { display: grid; grid-template-columns: 1fr 380px; gap: var(--space-4); }
.cal-month {
  background: var(--bg-elevated); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: var(--space-5);
}
.cal-month-header {
  display: flex; align-items: center; gap: var(--space-3); margin-bottom: var(--space-4);
}
.cal-month-header h2 { margin: 0; font-size: 17px; font-weight: 600; }
.cal-month-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
.cal-month-grid .dow {
  font-size: 10px; color: var(--text-dim); text-transform: uppercase; text-align: center;
  padding: 8px 0; font-weight: 600; letter-spacing: .04em;
}
.cal-month-grid .cday {
  min-height: 78px; border-radius: var(--radius); border: 1px solid var(--border);
  background: var(--bg-panel); padding: 5px 6px; font-size: 11px; cursor: pointer;
  position: relative; transition: border-color .12s, background .12s;
  display: flex; flex-direction: column; gap: 2px;
}
.cal-month-grid .cday:hover { border-color: var(--accent); background: var(--bg-hover); }
.cal-month-grid .cday.other-month { opacity: 0.35; }
.cal-month-grid .cday.today { border-color: var(--accent); }
.cal-month-grid .cday.today .dn { color: var(--accent); font-weight: 700; }
.cal-month-grid .cday.selected { border-color: var(--accent); border-width: 2px; background: var(--accent-soft); }
.cal-month-grid .cday .dn { color: var(--text-muted); font-weight: 600; font-size: 12px; }
.cal-month-grid .cday .density-bar {
  position: absolute; left: 0; bottom: 0; width: 100%; height: 3px; border-radius: 0 0 var(--radius) var(--radius);
}
.cal-event-chip {
  display: flex; align-items: center; gap: 3px; font-size: 10px; color: var(--text-muted);
  padding: 1px 4px; border-radius: 3px; background: var(--bg-active); white-space: nowrap;
  overflow: hidden; text-overflow: ellipsis; border-left: 2px solid var(--c-gcal);
}
.cal-event-chip.prsl {
  border-left-color: var(--accent);
}
.cal-nav-btn {
  width: 30px; height: 30px; border-radius: var(--radius); border: 1px solid var(--border);
  background: var(--bg-panel); color: var(--text-muted); display: grid; place-items: center;
}
.cal-nav-btn:hover { background: var(--bg-hover); color: var(--text); border-color: var(--accent); }
.cal-today-btn {
  padding: 5px 14px; border-radius: var(--radius); border: 1px solid var(--border);

}
.cal-today-btn:hover { background: var(--bg-hover); color: var(--text); }

/* Calendar day panel (right column) */
.cal-day-panel {
  background: var(--bg-elevated); border: 1px solid var(--border); border-radius: var(--radius-lg);
  display: flex; flex-direction: column; overflow: hidden; max-height: 680px;
}
.cal-day-panel .panel-head {
  padding: var(--space-4); border-bottom: 1px solid var(--border);
}
.cal-day-panel .panel-head .date-big { font-size: 22px; font-weight: 700; }
.cal-day-panel .panel-head .date-sub { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
.cal-day-panel .panel-body { padding: var(--space-4); overflow-y: auto; flex: 1; }
.cal-day-panel .section-label {
  font-size: 10.5px; text-transform: uppercase; letter-spacing: .06em; color: var(--text-dim);
  font-weight: 600; margin-bottom: 8px; display: flex; align-items: center; gap: 6px;
}
.cal-event-item {
  display: flex; gap: 10px; padding: 6px 0; border-bottom: 1px solid var(--border);
  font-size: 12px;
}
.cal-event-item:last-child { border-bottom: none; }
.cal-event-item .time { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); width: 42px; flex-shrink: 0; }
.cal-event-item .marker { width: 3px; border-radius: 2px; flex-shrink: 0; }
.cal-log-item {
  padding: 6px 0; border-bottom: 1px solid var(--border); cursor: pointer;
}
.cal-log-item:hover { color: var(--accent); }
.cal-log-item .lt { font-size: 12.5px; font-weight: 500; }
.cal-log-item .lm { font-size: 11px; color: var(--text-muted); margin-top: 2px; display: flex; gap: 6px; }

@media (max-width: 1100px){ .cal-page{ grid-template-columns: 1fr; } .two-col{ grid-template-columns: 1fr; } }

/* ============================================================
   EMBEDDING MAP (multi-layer onion circle-packing)
   ============================================================ */
.emb-page { display: grid; grid-template-columns: 1fr 360px; gap: var(--space-4); }
.emb-canvas { background: var(--bg-elevated); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: var(--space-3); display: flex; flex-direction: column; }

.emb-bubble { transition: fill-opacity .15s; }
.emb-bubble:hover { fill-opacity: 0.45 !important; }
.emb-label { pointer-events: none; user-select: none; }
.emb-breadcrumb { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; padding: var(--space-2) var(--space-3); border-bottom: 1px solid var(--border); min-height: 36px; }
.emb-crumb { font-size: 12px; color: var(--text-muted); cursor: pointer; }
.emb-crumb:hover { color: var(--accent); }
.emb-crumb.current { color: var(--text); font-weight: 600; }
.emb-crumb-sep { color: var(--text-dim); font-size: 11px; }
.emb-panel { background: var(--bg-elevated); border: 1px solid var(--border); border-radius: var(--radius-lg); display: flex; flex-direction: column; overflow: hidden; max-height: 700px; }
.emb-panel .panel-head { padding: var(--space-4); border-bottom: 1px solid var(--border); }
.emb-panel .panel-head .name { font-size: 16px; font-weight: 600; }
.emb-panel .panel-head .layer-tag { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
.emb-panel .panel-body { padding: var(--space-4); overflow-y: auto; flex: 1; }
.emb-panel .section-label {
  font-size: 10.5px; text-transform: uppercase; letter-spacing: .06em; color: var(--text-dim);
  font-weight: 600; margin-bottom: 8px; display: flex; align-items: center; gap: 6px;
}
.emb-child-item { display: flex; align-items: center; gap: var(--space-2); padding: 7px var(--space-2); border-radius: var(--radius-sm); cursor: pointer; transition: background .12s; }
.emb-child-item:hover { background: var(--bg-hover); }
.emb-child-item .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.emb-child-item .nm { flex: 1; font-size: 12.5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.emb-child-item .ct { font-size: 11px; color: var(--text-dim); font-variant-numeric: tabular-nums; }
.emb-toolbar { display: flex; align-items: center; gap: var(--space-2); padding: var(--space-2) var(--space-3); border-top: 1px solid var(--border); flex-wrap: wrap; }
@media (max-width: 1100px){ .emb-page{ grid-template-columns: 1fr; } }

/* ============================================================
   UTILITIES
   ============================================================ */
.muted { color: var(--text-muted); }
.dim { color: var(--text-dim); }
.row { display: flex; align-items: center; gap: var(--space-2); }
.between { justify-content: space-between; }
.wrap { flex-wrap: wrap; }
.gap2 { gap: var(--space-2); }
.gap3 { gap: var(--space-3); }
.mt2 { margin-top: var(--space-2); }
.mt3 { margin-top: var(--space-3); }
.mt4 { margin-top: var(--space-4); }
.mb2 { margin-bottom: var(--space-2); }
.mb3 { margin-bottom: var(--space-3); }
.center { display: grid; place-items: center; }
.hint { font-size: 11px; color: var(--text-dim); }
.divider { height: 1px; background: var(--border); margin: var(--space-3) 0; }
.two-col { display: grid; grid-template-columns: 2fr 1fr; gap: var(--space-4); }

/* ============================================================
   MOBILE / NARROW FALLBACK
   ============================================================ */
@media (max-width: 1100px) {
  .col-3, .col-4, .col-5, .col-6, .col-7, .col-8 { grid-column: span 12; }
  .kpis { grid-template-columns: repeat(2, 1fr); }

  .app { grid-template-columns: 1fr; grid-template-areas: "topbar" "main"; }

/* Super-domain mapping — the outermost onion layer */
const SUPER_DOMAIN_MAP = {
  "technical-work":         { label:"Work & Craft",  color:"var(--c-active)" },
  "knowledge-management":   { label:"Work & Craft",  color:"var(--c-purple)" },
  "business-development":   { label:"Work & Craft",  color:"var(--c-speculative)" },
  "finance":                { label:"Life Ops",      color:"var(--c-inferred)" },
  "planning":               { label:"Life Ops",      color:"var(--c-high)" },
  "administration":         { label:"Life Ops",      color:"var(--c-high)" },
  "house-management":       { label:"Life Ops",      color:"var(--c-retro)" },
  "domestic-infrastructure":{ label:"Life Ops",      color:"var(--c-retro)" },
  "physical-health":        { label:"Health & Body", color:"var(--c-confirmed)" },
  "cognitive-development":  { label:"Health & Body", color:"var(--c-confirmed)" },
};

/* Build 4-level hierarchy: super-domain -> domain -> project -> records */
function buildClusterTree(){
  const root = { name:"All Records", layer:0, children:[], size:0, records:[], color:"var(--text-dim)" };
  const sdN = {}, domN = {}, projN = {};

  records.forEach(r => {
    root.size++; root.records.push(r);
    const sdCfg = SUPER_DOMAIN_MAP[r.domain] || { label:"Other", color:"var(--text-dim)" };
    const sdKey = sdCfg.label;
    const domKey = r.domain || "uncategorized";
    const projKey = r.proj || "Unassigned";

    if(!sdN[sdKey]){
      sdN[sdKey] = { name:sdKey, layer:1, children:[], size:0, records:[], color:sdCfg.color };
      root.children.push(sdN[sdKey]);
    }
    const dk = sdKey + "|" + domKey;
    if(!domN[dk]){
      domN[dk] = { name:domKey, layer:2, children:[], size:0, records:[], color:domainColor(domKey) };
      sdN[sdKey].children.push(domN[dk]);
    }
    const pk = dk + "|" + projKey;
    if(!projN[pk]){
      projN[pk] = { name:projKey, layer:3, children:[], size:0, records:[], color:domainColor(domKey) };
      domN[dk].children.push(projN[pk]);
    }
    const leaf = { name:r.t, layer:4, size:1, records:[r], color:domainColor(domKey), record:r };
    projN[pk].children.push(leaf);
    projN[pk].size++; projN[pk].records.push(r);
    domN[dk].size++;  domN[dk].records.push(r);
    sdN[sdKey].size++; sdN[sdKey].records.push(r);
  });

  assignNodeIds(root, "");
  return root;
}

function assignNodeIds(node, id){
  node.id = id;
  if(node.children) node.children.forEach((c,i) => assignNodeIds(c, id ? id+"."+i : String(i)));
}

function findNodeById(root, id){
  if(!id) return root;
  let node = root;
  for(const p of id.split(".")){ node = node.children[+p]; if(!node) return null; }
  return node;
}

/* Compute radii bottom-up */
function computeRadii(node){
  if(!node.children || node.children.length === 0){ node.r = 14; return; }
  node.children.forEach(computeRadii);
  const area = node.children.reduce((s,c) => s + Math.PI * c.r * c.r, 0);
  node.r = Math.sqrt(area / Math.PI) * 1.6 + 8;
}

/* Place children inside parent using concentric rings (relative dx, dy) */
function placeChildren(node){
  if(!node.children || node.children.length === 0) return;
  const kids = [...node.children].sort((a,b) => b.r - a.r);
  const n = kids.length, pad = 5;

  if(n === 1){ kids[0].dx = 0; kids[0].dy = 0; }
  else {
    kids[0].dx = 0; kids[0].dy = 0;
    let placed = 1, ring = 0;
    while(placed < n){
      ring++;
      const rem = kids.slice(placed);
      const avgR = rem.reduce((s,c) => s + c.r, 0) / rem.length;
      const ringR = kids[0].r + avgR + pad + (ring - 1) * (avgR * 2 + pad);
      const maxFit = Math.max(1, Math.floor(2 * Math.PI * ringR / (2 * (avgR + pad))));
      const inRing = Math.min(maxFit, n - placed);
      for(let i = 0; i < inRing && placed < n; i++){
        const angle = (i / inRing) * 2 * Math.PI + (ring - 1) * 0.5;
        kids[placed].dx = ringR * Math.cos(angle);
        kids[placed].dy = ringR * Math.sin(angle);
        placed++;
      }
    }
  }
  kids.forEach(placeChildren);
  let maxExt = 0;
  kids.forEach(c => { const ext = Math.hypot(c.dx, c.dy) + c.r; if(ext > maxExt) maxExt = ext; });
  node.r = maxExt + 5;
}

/* Accumulate absolute positions from parent offsets */
function setAbsPos(node, pcx, pcy){
  node.cx = pcx + (node.dx || 0);
  node.cy = pcy + (node.dy || 0);
  if(node.children) node.children.forEach(c => setAbsPos(c, node.cx, node.cy));
}

function layoutCluster(root){
  computeRadii(root);
  root.dx = 0; root.dy = 0;
  placeChildren(root);
  setAbsPos(root, 0, 0);
}

function flattenTree(node, list){
  list = list || [];
  list.push(node);
  if(node.children) node.children.forEach(c => flattenTree(c, list));
  return list;
}

/* Breadcrumb (path from root to focused node) */
function renderEmbBreadcrumb(){
  const el = document.getElementById("emb-breadcrumb");
  if(!el || !embState.tree) return;
  const crumbs = [{ node: embState.tree, id:"" }];
  let node = embState.tree;
  if(embState.focusId){
    for(const p of embState.focusId.split(".")){
      node = node.children[+p];
      if(!node) break;
      const prevId = crumbs[crumbs.length-1].id;
      crumbs.push({ node, id: prevId ? prevId + "." + p : p });
    }
  }
  el.innerHTML = crumbs.map((c, i) => {
    const last = i === crumbs.length - 1;
    return `<span class="emb-crumb ${last?"current":""}" onclick="embNavigateTo('${c.id}')">${c.node.name}</span>` +
           (last ? "" : '<span class="emb-crumb-sep">\u203a</span>');
  }).join("");
}

/* SVG onion rendering */
function renderEmbSVG(){
  const svg = document.getElementById("emb-svg");
  if(!svg || !embState.tree) return;
  const focus = findNodeById(embState.tree, embState.focusId) || embState.tree;
  const visible = flattenTree(focus);
  const pad = 25;
  svg.setAttribute("viewBox",
    `${focus.cx - focus.r - pad} ${focus.cy - focus.r - pad} ${(focus.r + pad) * 2} ${(focus.r + pad) * 2}`);

  const byLayer = {};
  visible.forEach(n => { (byLayer[n.layer] = byLayer[n.layer] || []).push(n); });

  const vsColors = {
    confirmed:"var(--c-confirmed)", speculative:"var(--c-speculative)",
    inferred:"var(--c-inferred)", disputed:"var(--c-disputed)"
  };

  let html = "";
  for(let layer = 1; layer <= 4; layer++){
    (byLayer[layer] || []).forEach(n => {
      if(layer === 4){
        const vc = vsColors[n.record.vs] || n.color;
        html += `<circle class="emb-bubble" cx="${n.cx}" cy="${n.cy}" r="${n.r}" fill="${vc}" fill-opacity="0.9" stroke="var(--bg-elevated)" stroke-width="1.5" onclick="embClick('${n.id}')" style="cursor:pointer"><title>${n.record.t}</title></circle>`;
      } else {
        const fillO = 0.05 + layer * 0.03;
        const strokeW = layer === 1 ? 2 : 1.2;
        html += `<circle class="emb-bubble" cx="${n.cx}" cy="${n.cy}" r="${n.r}" fill="${n.color}" fill-opacity="${fillO}" stroke="var(--border-strong)" stroke-width="${strokeW}" onclick="embClick('${n.id}')" style="cursor:pointer"><title>${n.name} \u00b7 ${n.size} records</title></circle>`;
        if(n.r > 30){
          const fs = Math.min(13, n.r * 0.16);
          html += `<text class="emb-label" x="${n.cx}" y="${n.cy - fs * 0.3}" text-anchor="middle" font-size="${fs}" fill="var(--text)" font-weight="600">${n.name}</text>`;
          html += `<text class="emb-label" x="${n.cx}" y="${n.cy + fs * 0.9}" text-anchor="middle" font-size="${fs * 0.8}" fill="var(--text-muted)">${n.size}</text>`;
        }
      }
    });
  }
  svg.innerHTML = html;
}

/* Side panel: selected node summary + children + member records */
function renderEmbPanel(){
  const el = document.getElementById("emb-panel");
  if(!el || !embState.tree) return;
  const focus = findNodeById(embState.tree, embState.focusId) || embState.tree;
  const layerNames = ["All Records", "Super-domain", "Domain", "Sub-topic", "Record"];

    ? Math.round(focus.records.reduce((s,r) => s + (r.conf||0), 0) / focus.records.length * 100) : 0;

  let html = `<div class="panel-head">

  </div><div class="panel-body">`;

  if(focus.children && focus.children.length > 0){

    html += `<div>`;

      html += `<div class="emb-child-item" onclick="embClick('${c.id}')">

  }

    html += `<div class="section-label mt4"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg> Records (${recs.length})</div>`;

    }
  }
  html += `</div>`;
  el.innerHTML = html;
}

  renderEmbBreadcrumb(); renderEmbSVG(); renderEmbPanel();
}
function embNavigateTo(id){
  embState.focusId = id;

function embZoomOut(){
  if(!embState.focusId) return;
  const parts = embState.focusId.split("."); parts.pop();
  embState.focusId = parts.join(".");
  renderEmbBreadcrumb(); renderEmbSVG(); renderEmbPanel();
}
function embReset(){
  embState.focusId = "";
  renderEmbBreadcrumb(); renderEmbSVG(); renderEmbPanel();
}

/* ============================================================

   ============================================================ */
function renderHeatmapInto(elId, weeks=52){
  const days=7, cell=11, gap=3;
  const w=weeks*(cell+gap)+30, h=days*(cell+gap)+20;
  let svg=`<svg viewBox="0 0 ${w} ${h}" width="${w}" height="${h}">`;
  ["","Mon","","Wed","","Fri",""].forEach((lb,i)=>{ if(lb) svg+=`<text x="0" y="${i*(cell+gap)+18}" font-size="9" fill="var(--text-dim)">${lb}</text>`; });
  const months=["Jun","Jul","Aug","Sep","Oct","Nov","Dec","Jan","Feb","Mar","Apr","May","Jun"];
  months.forEach((m,i)=>{ svg+=`<text x="${30+i*Math.round(weeks/months.length)*(cell+gap)}" y="10" font-size="9" fill="var(--text-dim)">${m}</text>`; });
  const start=new Date(TODAY); start.setDate(start.getDate()-(weeks*7-1));
  start.setDate(start.getDate()-start.getDay());
  for(let wk=0;wk<weeks;wk++){
    for(let d=0;d<days;d++){
      const cur=new Date(start); cur.setDate(cur.getDate()+wk*7+d);
      const iso=isoDate(cur);
      const n=activityByDay[iso]||0;
      let level=0;
      if(n>=10)level=4; else if(n>=7)level=3; else if(n>=4)level=2; else if(n>=1)level=1;
      const colors=["var(--bg-active)","rgba(110,168,255,.3)","rgba(110,168,255,.55)","rgba(110,168,255,.8)","var(--accent)"];
      svg+=`<rect x="${30+wk*(cell+gap)}" y="${15+d*(cell+gap)}" width="${cell}" height="${cell}" rx="2" fill="${colors[level]}"><title>${iso}: ${n} records</title></rect>`;
    }
  }
  svg+="</svg>";
  document.getElementById(elId).innerHTML=svg;
}

function renderTopicInto(elId){
  const W=1000,H=200,pad=24;
  const topics=[
    {k:"technical-work",c:"var(--c-active)"},
    {k:"finance",c:"var(--c-speculative)"},
    {k:"health",c:"var(--c-confirmed)"},
    {k:"planning",c:"var(--c-inferred)"},
  ];
  const months=12;
  const rnd=seeded(11);
  const data=topics.map((t,ti)=>Array.from({length:months},(_,i)=>{
    const base=20+ti*8; const trend=Math.sin(i/2+ti)*10;
    return Math.max(5,base+trend+rnd()*15);
  }));
  let svg="";
  const stacks=Array.from({length:months},()=>0);
  topics.forEach((t,ti)=>{
    let top="", bot="";
    for(let i=0;i<months;i++){
      const x=pad+(i/(months-1))*(W-2*pad);
      const yBot=H-pad-stacks[i];
      const yTop=H-pad-(stacks[i]+data[ti][i]);
      top+=(i===0?"M":"L")+x+","+yTop+" ";
      bot="L"+x+","+yBot+" "+bot;
      stacks[i]+=data[ti][i];
    }
    svg+=`<path d="${top}${bot} Z" fill="${t.c}" opacity="0.45" stroke="${t.c}" stroke-width="1"/>`;
  });
  for(let i=0;i<months;i++){
    const x=pad+(i/(months-1))*(W-2*pad);
    svg+=`<text x="${x}" y="${H-6}" font-size="9" fill="var(--text-dim)" text-anchor="middle">${["Jul","Aug","Sep","Oct","Nov","Dec","Jan","Feb","Mar","Apr","May","Jun"][i]}</text>`;

  document.getElementById(elId).innerHTML=svg;
}

const REL_COLORS = {
  "depends-on":"var(--c-active)",

  "contradicts":"var(--c-disputed)",

};
const REL_LABELS = {
  "depends-on":"depends-on",
  "supports":"supports",
  "contradicts":"contradicts",
  "causes":"causes",
  "derived-from":"derived-from",
  "supersedes":"supersedes",
  "references":"references",
  "related-to":"related-to"
};
function renderRecordTimeLinePage(){
  const main=document.getElementById("main");
  // Build node list (records with relations) + edge list
  const linked = records.filter(r=>(r.rels||[]).length>0 || records.some(o=>(o.rels||[]).some(rel=>rel[1]===r.id)));
  const nodeIds = new Set(linked.map(r=>r.id));
  const edges = [];
  linked.forEach(r=>{(r.rels||[]).forEach(rel=>{
    if(nodeIds.has(rel[1])) edges.push({from:r.id,to:rel[1],type:rel[0]});
  });});
  // stats
  const relCounts={};
  edges.forEach(e=>{relCounts[e.type]=(relCounts[e.type]||0)+1;});
  const days = Array.from(new Set(linked.map(r=>r.created))).length;
  main.innerHTML = pageHeader("Record Time Line","Relational metadata \u00b7 day \u00d7 hour scatter of records", "")
    + `<div class="stat-row mb3">
        ${Object.entries(relCounts).slice(0,4).map(([k,v])=>`<div class="stat"><div class="k">${REL_LABELS[k]||k}</div><div class="v">${v}</div></div>`).join("")}
        <div class="stat"><div class="k">Records</div><div class="v">${linked.length}</div></div>
        <div class="stat"><div class="k">Days</div><div class="v">${days}</div></div>
       </div>
       <div class="artifact-canvas"><svg viewBox="0 0 1000 620" class="full-svg" id="rtl-full"></svg></div>
       <div class="hint mt3">X = day, Y = hour (00:00 top \u2192 24:00 bottom). Each point is a record (fill = domain, ring = validation-state). Click a point to inspect.</div>`;
  renderRecordTimeLineFull(linked);
}
function renderRecordTimeLineFull(nodes){
  // Day x Hour scatter: X = created date, Y = hour of day.
  const W=1000,H=620,padL=54,padR=30,padT=26,padB=54;
  const plotW=W-padL-padR, plotH=H-padT-padB;

  // unique sorted days -> X columns
  const days=Array.from(new Set(nodes.map(n=>n.created))).sort();
  const dayIndex={}; days.forEach((d,i)=>dayIndex[d]=i);
  const xOfDay=(i)=> days.length<=1 ? padL+plotW/2 : padL + plotW*i/(days.length-1);

  // hour of day from createdTime (HH:MM) -> 0..24
  const hourOf=(n)=>{ const [hh,mm]=(n.createdTime||"12:00").split(":").map(Number); return (hh||0)+(mm||0)/60; };
  const yOfHour=(h)=> padT + h/24*plotH;

  // positions; spread points sharing a day across the column to avoid overlap
  const perDay={}; nodes.forEach(n=>{perDay[n.created]=(perDay[n.created]||0)+1;});
  const seen={};
  const pos={};
  nodes.forEach(n=>{
    const di=dayIndex[n.created];
    let x=xOfDay(di);
    const count=perDay[n.created]||1;
    if(count>1){
      const idx=seen[n.created]||0; seen[n.created]=idx+1;
      const spread=Math.min(30,count*7);
      x = x - spread/2 + spread*(idx+0.5)/count;
    }
    pos[n.id]={x, y:yOfHour(hourOf(n))};
  });

  const vsColors={confirmed:"var(--c-confirmed)",speculative:"var(--c-speculative)",inferred:"var(--c-inferred)",disputed:"var(--c-disputed)"};

  let svg="";

  // hour gridlines + labels (every 3h)
  for(let h=0; h<=24; h+=3){
    const y=yOfHour(h);
    svg+=`<line x1="${padL}" y1="${y}" x2="${W-padR}" y2="${y}" stroke="var(--border)" stroke-width="1" ${h%6===0?'':'stroke-dasharray="2,4"'} opacity="0.5"/>`;
    svg+=`<text x="${padL-8}" y="${y+3}" font-size="9" fill="var(--text-dim)" text-anchor="end" font-family="var(--font-mono)">${String(h).padStart(2,"0")}:00</text>`;
  }

  // day gridlines + labels
  days.forEach((d,i)=>{
    const x=xOfDay(i);
    svg+=`<line x1="${x}" y1="${padT}" x2="${x}" y2="${padT+plotH}" stroke="var(--border)" stroke-width="1" stroke-dasharray="2,4" opacity="0.35"/>`;
    svg+=`<text x="${x}" y="${padT+plotH+18}" font-size="9.5" fill="var(--text-dim)" text-anchor="middle">${fmtDate(d)}</text>`;
  });

  // axes + axis titles
  svg+=`<line x1="${padL}" y1="${padT+plotH}" x2="${W-padR}" y2="${padT+plotH}" stroke="var(--border-strong)" stroke-width="1"/>`;
  svg+=`<line x1="${padL}" y1="${padT}" x2="${padL}" y2="${padT+plotH}" stroke="var(--border-strong)" stroke-width="1"/>`;
  svg+=`<text x="${padL-40}" y="${padT-10}" font-size="9" fill="var(--text-dim)" font-family="var(--font-mono)">HOUR</text>`;
  svg+=`<text x="${W-padR}" y="${padT+plotH+40}" font-size="9" fill="var(--text-dim)" text-anchor="end" font-family="var(--font-mono)">DAY</text>`;

  // points
  nodes.forEach(n=>{
    const p=pos[n.id]; if(!p) return;
    const c=domainColor(n.domain);
    const vc=vsColors[n.vs]||c;
    svg+=`<circle cx="${p.x}" cy="${p.y}" r="6" fill="${c}" class="rtl-node" data-id="${n.id}" style="cursor:pointer" stroke="${vc}" stroke-width="2"><title>${n.t} \u00b7 ${n.createdTime||""}</title></circle>`;
  });

  svg+="</svg>";
  const host=document.getElementById("rtl-full");
  host.innerHTML=svg;
  host.querySelectorAll(".rtl-node").forEach(el=>el.addEventListener("click",e=>{e.stopPropagation();openDetail(el.dataset.id);}));
}

      if(c<=19) dots.push({c:"var(--c-active)",t:"journal"});
      if(c%7===2||c%7===5) dots.push({c:"var(--c-speculative)",t:"finances"});
      if(c%3===0) dots.push({c:"var(--c-confirmed)",t:"workout"});
      if(c===1) dots.push({c:"var(--c-retro)",t:"filter"});
      return `<div class="day has"><div class="n">${c}</div><div class="dots">${dots.map(d=>`<i style="background:${d.c}" title="${d.t}"></i>`).join("")}</div></div>`;
    }).join("")}
  </div>`;
}

function renderTopicPage(){

  main.innerHTML = pageHeader("Topic Landscape Evolution","created-at · tags · domain · emergence & decline", `
    <div class="seg"><button>6 mo</button><button class="active">12 mo</button><button>24 mo</button></div>`)

        <div class="stat"><div class="k">Emerging</div><div class="v">finance</div></div>
        <div class="stat"><div class="k">Declining</div><div class="v">house-mgmt</div></div>

       </div>
       <div class="artifact-canvas"><svg viewBox="0 0 1000 400" class="full-svg" id="topic-full"></svg></div>
       <div class="legend mt3">${[["technical-work","var(--c-active)"],["finance","var(--c-speculative)"],["health","var(--c-confirmed)"],["planning","var(--c-inferred)"],["house-mgmt","var(--c-retro)"]].map(([k,c])=>`<span><i style="background:${c}"></i> ${k}</span>`).join("")}</div>`;
  renderTopicFull();
}
function renderTopicFull(){
  const W=1000,H=400,padL=40,padR=180,padT=20,padB=40;
  const topics=[
    {k:"technical-work",c:"var(--c-active)"},
    {k:"finance",c:"var(--c-speculative)"},
    {k:"health",c:"var(--c-confirmed)"},
    {k:"planning",c:"var(--c-inferred)"},
    {k:"house-mgmt",c:"var(--c-retro)"},
  ];
  const months=12;
  const rnd=seeded(11);
  const data=topics.map((t,ti)=>Array.from({length:months},(_,i)=>{
    const base=20+ti*6;
    let trend=0;
    if(t.k==="finance") trend=(i-6)*5;
    if(t.k==="house-mgmt") trend=(6-i)*3;
    if(t.k==="technical-work") trend=Math.sin(i/2)*8;
    return Math.max(5,base+trend+rnd()*10);
  }));
  let svg="";
  const plotH=H-padT-padB;
  const stacks=Array.from({length:months},()=>0);
  topics.forEach((t,ti)=>{
    let top="", bot="";
    for(let i=0;i<months;i++){
      const x=padL+(i/(months-1))*(W-padL-padR);
      const yBot=H-padB-(stacks[i]/100)*plotH;
      const yTop=H-padB-((stacks[i]+data[ti][i])/100)*plotH;
      top+=(i===0?"M":"L")+x+","+yTop+" ";
      bot="L"+x+","+yBot+" "+bot;
      stacks[i]+=data[ti][i];
    }
    svg+=`<path d="${top}${bot} Z" fill="${t.c}" opacity="0.5" stroke="${t.c}" stroke-width="1"/>`;
  });
  for(let i=0;i<months;i++){
    const x=padL+(i/(months-1))*(W-padL-padR);
    svg+=`<text x="${x}" y="${H-12}" font-size="9" fill="var(--text-dim)" text-anchor="middle">${["Jul","Aug","Sep","Oct","Nov","Dec","Jan","Feb","Mar","Apr","May","Jun"][i]}</text>`;
  }
  svg+=`<text x="${padL+8*(W-padL-padR)/11}" y="40" font-size="10" fill="var(--c-speculative)" font-weight="600">↑ finance emerging</text>`;
  svg+=`<text x="${padL+8*(W-padL-padR)/11}" y="56" font-size="10" fill="var(--c-retro)">↓ house-mgmt declining</text>`;
  document.getElementById("topic-full").innerHTML=svg;
}

/* ============================================================
   ANNOTATION LOG — append-only commentary (never mutates content)
   ============================================================ */
function renderAnnotationItem(recordId, a){
  const resolved = a.state === "resolved";
  const dateStr = new Date(a.at).toLocaleString("en-US",{month:"short",day:"numeric",hour:"2-digit",minute:"2-digit"});
  return `<div class="ann-item ${a.kind||""} ${resolved?"resolved":""}" id="ann-${a.id}">
    <div class="ann-meta">
      <span class="kind ${resolved?"resolved":""}">${a.kind||"comment"}</span>
      <span>·</span>
      <span>${a.author||"user"}</span>
      <span>·</span>
      <span>${dateStr}</span>
      ${resolved ? '<span class="pill confirmed" style="margin-left:auto">resolved</span>' :
        `<button onclick="resolveAnnotation('${recordId}','${a.id}')" style="margin-left:auto;background:none;border:none;color:var(--text-muted);font-size:11px;cursor:pointer">resolve</button>`}
    </div>
    <div class="ann-text ${resolved?'muted':''}">${a.text}</div>
  </div>`;
}

function addAnnotation(recordId){
  const textInput = document.getElementById("ann-text-"+recordId);
  const kindSel = document.getElementById("ann-kind-"+recordId);
  const text = (textInput.value||"").trim();
  if(!text) return;
  const kind = kindSel.value;
  const r = recById[recordId];
  if(!r.annotations) r.annotations = [];
  const ann = {
    id: "a"+Date.now(),
    at: new Date().toISOString(),
    author: "you",
    kind: kind,
    state: "open",
    text: text,
  };
  r.annotations.push(ann);
  // Re-render the annotation list without touching record content
  const listEl = document.getElementById("ann-list-"+recordId);
  if(listEl){
    const empty = listEl.querySelector(".ann-empty");
    if(empty) empty.remove();
    listEl.insertAdjacentHTML("beforeend", renderAnnotationItem(recordId, ann));
  }
  textInput.value = "";
  textInput.focus();
}

function resolveAnnotation(recordId, annId){
  const r = recById[recordId];
  if(!r || !r.annotations) return;
  const ann = r.annotations.find(a => a.id === annId);
  if(!ann) return;
  ann.state = "resolved";
  // Re-render this annotation item in place
  const el = document.getElementById("ann-"+annId);
  if(el) el.outerHTML = renderAnnotationItem(recordId, ann);
}

  {cat:"AI", k:"Structure note into PRSL record"},
  {cat:"View", k:"Toggle theme", sc:"⌘."},
];
function renderCmds(filter=""){
  const f=filter.toLowerCase();
  const matched=commands.filter(c=>c.k.toLowerCase().includes(f)||c.cat.toLowerCase().includes(f));
  document.getElementById("cmd-results").innerHTML=matched.map((c,i)=>`
    <div class="cmd-item ${i===0?"active":""}" data-route="${c.route||""}">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="2"><path d="M12 20h9M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>
      <span>${c.k}</span>
      ${c.sc?`<kbd>${c.sc}</kbd>`:""}
      <span class="cat">${c.cat}</span>
    </div>`).join("")||'<div class="dim" style="padding:16px;text-align:center">No matches</div>';
  document.querySelectorAll("#cmd-results .cmd-item").forEach(el=>{
    el.addEventListener("click",()=>{ if(el.dataset.route){ closePalette(); go(el.dataset.route); } });
  });
}
function openPalette(){
  document.getElementById("overlay").classList.add("show");
  document.getElementById("palette").style.display="block";
  document.getElementById("cmd-input").value="";
  renderCmds();
  setTimeout(()=>document.getElementById("cmd-input").focus(),10);
}
function closePalette(){
  document.getElementById("overlay").classList.remove("show");
  document.getElementById("palette").style.display="none";
}

/* ============================================================
   INIT
   ============================================================ */
function init(){
  document.querySelectorAll(".nav-item[data-route]").forEach(el=>{
    el.addEventListener("click",e=>{ e.preventDefault(); go(el.dataset.route); });
  });
  document.getElementById("cmd-input").addEventListener("input",e=>renderCmds(e.target.value));
  document.getElementById("theme-toggle").addEventListener("click",()=>{
    const html=document.documentElement;
    html.dataset.theme = html.dataset.theme==="dark"?"light":"dark";
  });
  document.addEventListener("keydown",e=>{
    if((e.metaKey||e.ctrlKey)&&e.key.toLowerCase()==="k"){ e.preventDefault(); openPalette(); }
    if(e.key==="Escape"){ closePalette(); closeDetail(); }
    if(e.key.toLowerCase()==="n"&&!e.metaKey&&!e.ctrlKey&&document.activeElement.tagName!=="INPUT"){ openPalette(); }
    if(e.key.toLowerCase()==="."&&e.metaKey){ e.preventDefault(); document.getElementById("theme-toggle").click(); }
  });
  document.getElementById("search").addEventListener("keydown",e=>{ if(e.key==="Enter") openPalette(); });

  renderRoute();
  setTimeout(()=>openDetail("r6"),400);
}
init();
