<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scratchpad — shared</title>
  <link rel="stylesheet" href="/pwos/css/variables.css">
  <link rel="stylesheet" href="/pwos/css/fonts.css">
  <link rel="stylesheet" href="/pwos/css/base.css">
  <link rel="stylesheet" href="/pwos/css/components.css">
  <link rel="stylesheet" href="/pwos/css/views.css">
  <link rel="stylesheet" href="/pwos/katex/katex.min.css">
  <style>
    body{background:var(--color-surface-warm)}
    .share-shell{max-width:820px;margin:0 auto;padding:var(--space-8) var(--space-5) var(--space-16)}
    .share-top{display:flex;align-items:center;justify-content:space-between;gap:var(--space-3);
      margin-bottom:var(--space-5);flex-wrap:wrap}
    .share-brand{display:flex;align-items:center;gap:10px;font-family:var(--font-display);color:var(--ink-1)}
    .share-brand .mono{color:var(--oxford);font-weight:600}
    .share-pill{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;font-family:var(--font-mono);
      padding:4px 10px;border-radius:var(--radius-pill);border:1px solid var(--color-border)}
    .share-pill.is-edit{color:var(--oxford);border-color:var(--oxford-tint);background:var(--oxford-bg)}
    .share-pill.is-view{color:var(--color-text-secondary)}
    .share-toolbar{display:flex;align-items:center;gap:var(--space-2);margin-bottom:var(--space-3)}
    .share-status{font-size:var(--text-sm);color:var(--color-text-muted);font-family:var(--font-mono);margin-bottom:var(--space-3)}
    .share-card{background:var(--color-surface);border:1px solid var(--color-border-light);border-radius:var(--radius-lg);
      padding:var(--space-5) var(--space-6);box-shadow:0 1px 2px rgba(0,0,0,.02)}
    .share-area{width:100%;min-height:58vh;resize:vertical;border:none;background:transparent;outline:none;
      font-family:var(--font-mono);font-size:14px;line-height:1.7;color:var(--ink-1)}
    .share-msg{text-align:center;padding:var(--space-16) var(--space-4);color:var(--color-text-muted)}
    .share-msg h2{font-family:var(--font-display);color:var(--ink-1);margin-bottom:var(--space-2)}
    @media(max-width:680px){.share-shell{padding:var(--space-5) var(--space-4)}}
  </style>
</head>
<body>
  <div class="share-shell">
    <div class="share-top">
      <div class="share-brand"><pw-icon name="file-text" size="20"></pw-icon> <span class="mono">PWOS</span> &middot; shared Scratchpad</div>
      <div id="sharePill"></div>
    </div>
    <div class="share-toolbar" id="shareToolbar"></div>
    <div class="share-status" id="shareStatus"></div>
    <div id="shareBody"></div>
  </div>

  <div class="toast" id="toast"></div>
  <script src="/pwos/js/icons.js"></script>
  <script src="/pwos/katex/katex.min.js"></script>
  <script src="/pwos/js/md.js"></script>
  <script>
    window.PW = window.PW || {};
    PW.esc = function (s) { if (s == null) return ''; const d = document.createElement('div'); d.textContent = String(s); return d.innerHTML; };
    PW.toast = function (m) { const t = document.getElementById('toast'); t.textContent = m; t.classList.add('show'); clearTimeout(this._tt); this._tt = setTimeout(function(){t.classList.remove('show');}, 2400); };

    const TOKEN = (location.pathname.split('/share/')[1] || '').replace(/\/+$/, '');
    let permission = 'view', body = '', updatedAt = '', mode = 'view', dirty = false, saveTimer = null;

    async function load() {
      if (!TOKEN) return showMsg('alert-triangle', 'No share token', 'This link is incomplete.');
      let r;
      try { r = await fetch('/pwos/api/scratch/shared/' + encodeURIComponent(TOKEN)); }
      catch (e) { return showMsg('alert-triangle', 'Cannot reach the server', 'Make sure PWOS is running.'); }
      if (r.status === 404) return showMsg('alert-triangle', 'Link not valid', 'This share link is invalid or has been revoked.');
      if (!r.ok) return showMsg('alert-triangle', 'Could not load', 'Status ' + r.status);
      const d = await r.json();
      permission = d.permission || 'view';
      body = d.body || '';
      updatedAt = d.updated_at || '';
      mode = (permission === 'edit') ? 'edit' : 'view';
      renderPill();
      renderToolbar();
      renderSurface();
      renderStatus();
    }

    function renderPill() {
      const el = document.getElementById('sharePill');
      const editable = permission === 'edit';
      el.innerHTML = '<span class="share-pill ' + (editable ? 'is-edit' : 'is-view') + '">' +
        '<pw-icon name="' + (editable ? 'pencil-line' : 'book-open') + '" size="12"></pw-icon> ' +
        (editable ? 'editable' : 'view-only') + '</span>';
    }

    function renderToolbar() {
      const el = document.getElementById('shareToolbar');
      if (permission !== 'edit') { el.innerHTML = ''; return; }
      const edit = mode === 'edit';
      el.innerHTML =
        '<div class="seg">' +
          '<button class="seg-btn' + (edit ? ' is-active' : '') + '" id="mEdit"><pw-icon name="pencil-line" size="14"></pw-icon> Edit</button>' +
          '<button class="seg-btn' + (!edit ? ' is-active' : '') + '" id="mPrev"><pw-icon name="book-open" size="14"></pw-icon> Preview</button>' +
        '</div>' +
        '<button class="btn btn-primary btn-sm" id="mSave"><pw-icon name="check" size="14"></pw-icon> Save</button>';
      document.getElementById('mEdit').onclick = function () { setMode('edit'); };
      document.getElementById('mPrev').onclick = function () { setMode('preview'); };
      document.getElementById('mSave').onclick = save;
    }

    function renderSurface() {
      const el = document.getElementById('shareBody');
      if (mode === 'preview' || permission !== 'edit') {
        el.innerHTML = '<div class="share-card"><div class="md scratch-doc">' + PW.Markdown.render(body) + '</div></div>';
        return;
      }
      el.innerHTML = '<div class="share-card"><textarea class="share-area" id="shareArea" placeholder="Write freely — markdown + LaTeX. Ctrl/Cmd+S to save.">' +
        PW.esc(body) + '</textarea></div>';
      const ta = document.getElementById('shareArea');
      ta.addEventListener('input', function () { dirty = true; renderStatus(); clearTimeout(saveTimer); saveTimer = setTimeout(save, 1200); });
      ta.addEventListener('keydown', function (e) { if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 's') { e.preventDefault(); save(); } });
      ta.addEventListener('blur', function () { if (dirty) save(); });
    }

    function renderStatus() {
      const el = document.getElementById('shareStatus');
      if (permission !== 'edit') { el.innerHTML = updatedAt ? 'last updated ' + relative(updatedAt) : ''; return; }
      const w = body.trim() ? body.trim().split(/\s+/).length : 0;
      el.innerHTML = (dirty ? '<span style="color:var(--gold);font-weight:600">unsaved changes</span>' : '<span>saved</span>') +
        ' &middot; ' + w + ' word' + (w === 1 ? '' : 's') + (updatedAt ? ' &middot; last saved ' + relative(updatedAt) : '');
    }

    function setMode(m) {
      if (mode === m) return;
      const go = function () { mode = m; renderToolbar(); renderSurface(); renderStatus(); };
      if (dirty) save().then(go); else go();
    }

    async function save() {
      clearTimeout(saveTimer);
      if (mode !== 'edit') { dirty = false; renderStatus(); return; }
      const ta = document.getElementById('shareArea');
      if (!ta) return;
      const newBody = ta.value;
      try {
        const r = await fetch('/pwos/api/scratch/shared/' + encodeURIComponent(TOKEN), {
          method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ body: newBody })
        });
        if (r.status === 403) { PW.toast('This link is view-only'); return; }
        if (!r.ok) { PW.toast('Save failed'); return; }
        const d = await r.json();
        body = d.body; updatedAt = d.updated_at; dirty = false; renderStatus();
      } catch (e) { PW.toast('Save failed — server unreachable'); }
    }

    function relative(iso) {
      if (!iso) return '';
      const s = Math.round((Date.now() - new Date(iso).getTime()) / 1000);
      if (s < 60) return 'just now';
      const m = Math.round(s / 60); if (m < 60) return m + 'm ago';
      const h = Math.round(m / 60); if (h < 24) return h + 'h ago';
      return Math.round(h / 24) + 'd ago';
    }

    function showMsg(icon, title, detail) {
      document.getElementById('shareToolbar').innerHTML = '';
      document.getElementById('shareStatus').innerHTML = '';
      document.getElementById('shareBody').innerHTML =
        '<div class="share-msg"><div style="opacity:.4;margin-bottom:8px"><pw-icon name="' + icon + '" size="36"></pw-icon></div>' +
        '<h2>' + PW.esc(title) + '</h2><p>' + PW.esc(detail) + '</p></div>';
    }

    document.addEventListener('DOMContentLoaded', load);
  </script>
</body>
</html>
