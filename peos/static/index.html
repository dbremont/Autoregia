<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Autoregia — External Observation (PEOS)</title>
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/fonts.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/views.css">
  <link rel="stylesheet" href="css/command-palette.css">
  <link rel="stylesheet" href="css/peos.css">
</head>
<body>

<div class="app-shell">

  <!-- ═══ Header ═══ -->
  <header class="app-header">
    <div class="header-brand">
      <span class="header-monogram" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M2 6c.6.5 1.2 1 2.5 1C7 7 7 5 9.5 5c2.6 0 2.4 2 5 2 2.5 0 2.5-2 5-2 1.3 0 1.9.5 2.5 1"/><path d="M2 12c.6.5 1.2 1 2.5 1 2.5 0 2.5-2 5-2 2.6 0 2.4 2 5 2 2.5 0 2.5-2 5-2 1.3 0 1.9.5 2.5 1"/><path d="M2 18c.6.5 1.2 1 2.5 1 2.5 0 2.5-2 5-2 2.6 0 2.4 2 5 2 2.5 0 2.5-2 5-2 1.3 0 1.9.5 2.5 1"/></svg></span>
      <span class="brand-wordmark">Autoregia <em>External</em> Observation</span>
    </div>
    <div class="header-search">
      <span class="search-icon"><peos-icon name="search" size="16"></peos-icon></span>
      <input type="search" id="globalSearch" placeholder="Filter the signal stream…  ( Ctrl K )" autocomplete="off">
    </div>
    <div class="header-actions">
      <button class="btn btn-ghost btn-sm" id="btnDocs" title="Documentation"><peos-icon name="clipboard-list" size="15"></peos-icon> Docs</button>
      <button class="btn btn-primary btn-sm" id="btnExport" title="Export"><peos-icon name="download" size="15"></peos-icon> Export</button>
    </div>
  </header>

  <!-- ═══ Sidebar ═══ -->
  <aside class="app-sidebar">
    <nav class="sidebar-nav" id="sidebarNav"></nav>
    <div class="sidebar-colophon">
      <div class="colophon-rule"></div>
      <div class="colophon-title">Instruments over what other agents say about the world.</div>
      <div class="colophon-meta">CouchDB · observational events · v0.3.0</div>
    </div>
  </aside>

  <!-- ═══ Main ═══ -->
  <main class="app-main" id="appContent"></main>

  <!-- ═══ Footer ═══ -->
  <footer class="app-footer">
    <div class="footer-rule"></div>
    <div class="footer-title">PEOS — analytical instruments for external observation</div>
    <span class="pill gold">observational</span>
    <div class="footer-meta">window: <span id="footerWindow">7d</span> · <span id="footerFilter">no filter</span></div>
  </footer>

</div>

<!-- ═══ Command Palette ═══ -->
<div class="cmd-palette-overlay hidden" id="cmdPalette">
  <div class="cmd-palette">
    <div class="cmd-palette-search">
      <span><peos-icon name="search" size="18"></peos-icon></span>
      <input type="text" id="cmdInput" placeholder="Type a command or search the stream…" autocomplete="off">
      <span class="kbd-hint">ESC</span>
    </div>
    <div class="cmd-results" id="cmdResults"></div>
  </div>
</div>

<!-- ═══ Scratchpad ═══ -->
<div class="scratchpad-overlay hidden" id="scratchpadOverlay">
  <div class="scratchpad">
    <div class="scratchpad-header">
      <h3 style="margin:0;font-size:var(--text-base);">Quick Filter</h3>
      <button class="btn-icon" onclick="PEOS.scratchpad.close()"><peos-icon name="x" size="17"></peos-icon></button>
    </div>
    <div class="scratchpad-body">
      <textarea id="scratchpadText" placeholder="Type a phrase to filter the signal stream…"></textarea>
      <div style="display:flex;gap:var(--space-2);margin-top:var(--space-3);justify-content:flex-end;">
        <button class="btn btn-secondary btn-sm" onclick="PEOS.scratchpad.close()">Cancel</button>
        <button class="btn btn-primary btn-sm" onclick="PEOS.scratchpad.save()">Filter</button>
      </div>
    </div>
  </div>
</div>

<!-- ═══ App Modal (Docs) ═══ -->
<div class="modal-overlay hidden" id="appModal">
  <div class="modal" style="max-width:680px;">
    <div class="modal-header">
      <h2 id="modalTitle">Documentation</h2>
      <button class="btn-icon" onclick="PEOS.closeModal()"><peos-icon name="x" size="17"></peos-icon></button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer">
      <button class="btn btn-secondary btn-sm" onclick="PEOS.closeModal()">Close</button>
    </div>
  </div>
</div>

<!-- ═══ Scripts ═══ -->
<script src="js/vendor/echarts.min.js"></script>
<script src="js/vendor/echarts-wordcloud.min.js"></script>
<script src="js/store.js"></script>
<script src="js/vader.js"></script>
<script src="js/icons.js"></script>
<script src="js/charts.js"></script>
<script src="js/views.js"></script>
<script src="js/pulse.js"></script>
<script src="js/flow.js"></script>
<script src="js/composition.js"></script>
<script src="js/landscape.js"></script>
<script src="js/clusters.js"></script>
<script src="js/reading.js"></script>
<script src="js/topics.js"></script>
<script src="js/app.js"></script>
<script src="js/command-palette.js"></script>
<script src="js/scratchpad.js"></script>

</body>
</html>
