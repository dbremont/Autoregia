<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Autoregia — Agency Dashboard</title>
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/fonts.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/views.css">
  <link rel="stylesheet" href="css/command-palette.css">
</head>
<body>

<div class="app-shell">

  <!-- ═══ Header ═══ -->
  <header class="app-header">
    <div class="header-brand">
      <span class="header-monogram" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="m17 2 4 4-4 4"/><path d="M3 11v-1a4 4 0 0 1 4-4h14"/><path d="m7 22-4-4 4-4"/><path d="M21 13v1a4 4 0 0 1-4 4H3"/></svg></span>
      <span class="brand-wordmark">Autoregia <em>Agency</em> Dashboard</span>
    </div>
    <div class="header-search">
      <span class="search-icon"><loop-icon name="search" size="16"></loop-icon></span>
      <input type="search" id="globalSearch" placeholder="Search the control loop…  ( Ctrl K )" autocomplete="off">
    </div>
    <div class="header-actions">
      <button class="btn btn-ghost btn-sm" id="btnDocs" title="Documentation"><loop-icon name="clipboard-list" size="15"></loop-icon> Docs</button>
      <button class="btn btn-primary btn-sm" id="btnExport" title="Export substrate"><loop-icon name="download" size="15"></loop-icon> Export</button>
    </div>
  </header>

  <!-- ═══ Sidebar ═══ -->
  <aside class="app-sidebar">
    <nav class="sidebar-nav" id="sidebarNav">
      <div class="sidebar-label">Console</div>
    </nav>
    <div class="sidebar-colophon">
      <div class="colophon-rule"></div>
      <div class="colophon-title">Analytical tools over the data generated by the agent and its environment.</div>
      <div class="colophon-meta">read-only · mock data · v0.2.0</div>
    </div>
  </aside>

  <!-- ═══ Main ═══ -->
  <main class="app-main" id="appContent"></main>

  <!-- ═══ Footer ═══ -->
  <footer class="app-footer">
    <div class="footer-rule"></div>
    <div class="footer-title">Autoregia — analytical instruments for self-management</div>
    <span class="pill gold">Prototype · Mock Data</span>
    <div class="footer-meta">window: <span id="footerWindow">30d</span> · computed live</div>
  </footer>

</div>

<!-- ═══ Command Palette ═══ -->
<div class="cmd-palette-overlay hidden" id="cmdPalette">
  <div class="cmd-palette">
    <div class="cmd-palette-search">
      <span><loop-icon name="search" size="18"></loop-icon></span>
      <input type="text" id="cmdInput" placeholder="Type a command or navigate…" autocomplete="off">
      <span class="kbd-hint">ESC</span>
    </div>
    <div class="cmd-results" id="cmdResults"></div>
  </div>
</div>

<!-- ═══ Scratchpad ═══ -->
<div class="scratchpad-overlay hidden" id="scratchpadOverlay">
  <div class="scratchpad">
    <div class="scratchpad-header">
      <h3 style="margin:0;font-size:var(--text-base);">Quick Capture</h3>
      <button class="btn-icon" onclick="LOOP.scratchpad.close()"><loop-icon name="x" size="17"></loop-icon></button>
    </div>
    <div class="scratchpad-body">
      <textarea id="scratchpadText" placeholder="Capture an observation, deviation, or hypothesis…"></textarea>
      <div style="display:flex;gap:var(--space-2);margin-top:var(--space-3);justify-content:flex-end;">
        <button class="btn btn-secondary btn-sm" onclick="LOOP.scratchpad.close()">Cancel</button>
        <button class="btn btn-primary btn-sm" onclick="LOOP.scratchpad.save()">Save Note</button>
      </div>
    </div>
  </div>
</div>

<!-- ═══ App Modal (Docs) ═══ -->
<div class="modal-overlay hidden" id="appModal">
  <div class="modal" style="max-width:680px;">
    <div class="modal-header">
      <h2 id="modalTitle">Documentation</h2>
      <button class="btn-icon" onclick="LOOP.closeModal()"><loop-icon name="x" size="17"></loop-icon></button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer">
      <button class="btn btn-secondary btn-sm" onclick="LOOP.closeModal()">Close</button>
    </div>
  </div>
</div>

<!-- ═══ Scripts ═══ -->
<script src="js/vendor/echarts.min.js"></script>
<script src="js/store.js"></script>
<script src="js/icons.js"></script>
<script src="js/charts.js"></script>
<script src="js/views.js"></script>
<script src="js/gap.js"></script>
<script src="js/commitments.js"></script>
<script src="js/goals.js"></script>
<script src="js/plan.js"></script>
<script src="js/resources.js"></script>
<script src="js/deviation.js"></script>
<script src="js/app.js"></script>
<script src="js/command-palette.js"></script>
<script src="js/scratchpad.js"></script>

</body>
</html>
